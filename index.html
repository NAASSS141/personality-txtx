<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>学习方式测试｜找到真正适合你的学习方法</title>
  <style>

    :root{
      --bg:#f7f7f8;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --dark:#111827;
      --soft:#f1f5f9;
      --accent:#111827;
      --radius:24px;
      --screen-pad:14px;
      --tap:58px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html{
      min-height:100%;
      scroll-behavior:smooth;
      -webkit-text-size-adjust:100%;
    }
    body{
      min-height:100%;
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      background:
        radial-gradient(circle at 0% 0%,rgba(15,23,42,.08),transparent 34%),
        linear-gradient(180deg,#fbfbfc 0%,var(--bg) 100%);
      color:var(--text);
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior-y:contain;
    }
    button,input,textarea{font:inherit}
    button{touch-action:manipulation}
    .app{
      min-height:100svh;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:var(--screen-pad);
      padding-top:calc(var(--screen-pad) + env(safe-area-inset-top));
      padding-bottom:calc(22px + env(safe-area-inset-bottom));
    }
    .wrap{width:100%;max-width:540px;margin:0 auto}
    .card{
      width:100%;
      background:rgba(255,255,255,.96);
      border:1px solid rgba(229,231,235,.85);
      border-radius:28px;
      box-shadow:0 18px 56px rgba(15,23,42,.10);
      padding:22px;
      animation:up .24s ease both;
      overflow:hidden;
    }
    @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .pill{
      display:inline-flex;
      gap:8px;
      align-items:center;
      max-width:100%;
      background:var(--soft);
      color:var(--muted);
      border-radius:999px;
      padding:8px 12px;
      font-size:13px;
      line-height:1.25;
      font-weight:700;
      margin-bottom:20px;
    }
    h1{
      font-size:clamp(34px,9vw,48px);
      line-height:1.08;
      margin:0 0 18px;
      letter-spacing:-.045em;
      text-wrap:balance;
    }
    h2{
      font-size:clamp(24px,6.7vw,34px);
      line-height:1.18;
      margin:0 0 18px;
      letter-spacing:-.035em;
      text-wrap:balance;
    }
    h3{font-size:18px;line-height:1.35;margin:0 0 10px}
    p{line-height:1.72;margin:0;color:var(--muted)}
    ul{margin:8px 0 0;padding-left:20px;color:var(--muted);line-height:1.72}
    li{margin:6px 0}
    .hero-text{font-size:16px;margin-bottom:24px}
    .grid{display:grid;gap:12px}
    .features{grid-template-columns:1fr;margin:22px 0}
    .feature{
      background:var(--soft);
      border-radius:18px;
      padding:15px 16px;
      font-size:14px;
      line-height:1.45;
      font-weight:750;
    }
    .btn{
      appearance:none;
      border:0;
      background:var(--dark);
      color:white;
      border-radius:18px;
      width:100%;
      min-height:var(--tap);
      padding:13px 18px;
      font-size:16px;
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      cursor:pointer;
      transition:transform .14s ease,background .14s ease,opacity .14s ease;
      user-select:none;
    }
    .btn:active{transform:scale(.985)}
    .btn.secondary{background:white;color:var(--text);border:1px solid var(--line)}
    .btns{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      margin-top:18px;
      padding-bottom:env(safe-area-inset-bottom);
    }
    .small{font-size:13px;color:var(--muted);margin-top:14px}
    .progress-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      color:var(--muted);
      font-size:13px;
      font-weight:700;
      margin-bottom:10px;
    }
    .bar{
      height:9px;
      background:var(--soft);
      border-radius:99px;
      overflow:hidden;
      margin-bottom:16px;
    }
    .bar span{display:block;height:100%;background:var(--dark);border-radius:99px;transition:width .25s ease}
    .question-tools{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      min-height:34px;
      margin-bottom:16px;
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }
    .link-btn{
      appearance:none;
      border:1px solid var(--line);
      background:white;
      color:var(--muted);
      border-radius:999px;
      min-height:34px;
      padding:6px 12px;
      font-size:13px;
      font-weight:800;
    }
    .tip{
      background:var(--soft);
      color:var(--muted);
      padding:13px 14px;
      border-radius:16px;
      font-size:13px;
      line-height:1.55;
      margin-bottom:18px;
    }
    .option{
      width:100%;
      min-height:var(--tap);
      text-align:left;
      background:white;
      border:1px solid var(--line);
      border-radius:19px;
      padding:17px 16px;
      font-size:15.5px;
      font-weight:750;
      line-height:1.45;
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      cursor:pointer;
      transition:transform .14s ease,background .14s ease,color .14s ease,border-color .14s ease;
      user-select:none;
    }
    .option:active{
      transform:scale(.99);
      background:var(--dark);
      color:white;
      border-color:var(--dark);
    }
    .option span:last-child{flex-shrink:0;opacity:.55}
    .result-head{
      background:var(--dark);
      color:white;
      border-radius:24px;
      padding:22px;
      margin-bottom:14px;
    }
    .result-head p{color:#cbd5e1;margin-bottom:8px}
    .result-head h1{font-size:clamp(32px,8vw,44px);margin:0;line-height:1.1}
    .section{
      background:white;
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px;
      margin-top:12px;
      scroll-margin-top:14px;
    }
    .section.soft{background:var(--soft);border:0}
    .chips{display:grid;grid-template-columns:1fr;gap:9px}
    .chip{
      background:#f8fafc;
      border-radius:17px;
      padding:13px 14px;
      line-height:1.45;
    }
    .chip b{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
    .share-card{
      background:linear-gradient(180deg,#fff 0%,#f8fafc 100%);
      border:1px solid var(--line);
      border-radius:24px;
      padding:20px;
      margin-top:12px;
    }
    .share-card .label{font-size:13px;color:var(--muted);font-weight:750;margin-bottom:8px}
    .share-card .name{font-size:28px;font-weight:900;letter-spacing:-.04em;line-height:1.08;margin-bottom:10px}
    .share-card .quote{font-size:16px;font-weight:750;line-height:1.55;color:var(--text)}
    .role{
      background:#f8fafc;
      border-radius:17px;
      padding:13px 14px;
      margin-top:9px;
    }
    .role strong{display:block;margin-bottom:4px}
    .loading{text-align:center;padding:44px 22px}
    .spin{
      width:58px;
      height:58px;
      border-radius:18px;
      background:var(--soft);
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 auto 18px;
      animation:spin 1s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .toast{
      position:fixed;
      left:50%;
      bottom:calc(18px + env(safe-area-inset-bottom));
      transform:translateX(-50%) translateY(8px);
      background:#111827;
      color:white;
      padding:11px 15px;
      border-radius:999px;
      font-size:13px;
      font-weight:800;
      opacity:0;
      pointer-events:none;
      transition:.18s ease;
      z-index:20;
      max-width:calc(100vw - 28px);
      white-space:nowrap;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .hidden{display:none!important}

    .fun-hero{
      position:relative;
      overflow:hidden;
      background:linear-gradient(145deg,var(--soft) 0%,#fff 72%);
      border:1px solid var(--line);
      border-radius:26px;
      padding:22px;
      margin-bottom:12px;
    }
    .fun-hero:before{
      content:"";
      position:absolute;
      width:150px;
      height:150px;
      right:-58px;
      top:-58px;
      border-radius:999px;
      background:var(--accent);
      opacity:.12;
    }
    .fun-emoji{
      width:64px;
      height:64px;
      border-radius:22px;
      background:white;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:30px;
      box-shadow:0 12px 32px rgba(15,23,42,.08);
      margin-bottom:14px;
      position:relative;
      z-index:1;
    }
    .fun-label{
      color:var(--muted);
      font-size:13px;
      font-weight:800;
      margin-bottom:6px;
      position:relative;
      z-index:1;
    }
    .fun-name{
      font-size:32px;
      font-weight:950;
      letter-spacing:-.045em;
      line-height:1.05;
      margin-bottom:12px;
      position:relative;
      z-index:1;
    }
    .fun-hook{
      font-size:17px;
      line-height:1.55;
      font-weight:800;
      color:var(--text);
      margin-bottom:10px;
      position:relative;
      z-index:1;
    }
    .fun-metaphor{
      background:rgba(255,255,255,.74);
      border:1px solid rgba(229,231,235,.9);
      border-radius:18px;
      padding:12px 13px;
      color:var(--muted);
      font-size:14px;
      line-height:1.55;
      position:relative;
      z-index:1;
    }
    .tag-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:14px;
      position:relative;
      z-index:1;
    }
    .tag{
      background:var(--accent);
      color:white;
      border-radius:999px;
      padding:7px 10px;
      font-size:12px;
      font-weight:850;
      line-height:1;
    }
    .mini-map{
      display:grid;
      grid-template-columns:1fr;
      gap:9px;
      margin-top:12px;
    }
    .mini-step{
      display:flex;
      align-items:center;
      gap:10px;
      background:#f8fafc;
      border-radius:16px;
      padding:12px;
    }
    .mini-step span:first-child{
      width:28px;
      height:28px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:10px;
      background:var(--soft);
      font-size:15px;
      flex-shrink:0;
    }
    .mini-step b{
      display:block;
      font-size:13px;
      margin-bottom:2px;
    }
    .mini-step em{
      display:block;
      font-style:normal;
      font-size:12px;
      color:var(--muted);
    }
    .section-title-icon{
      display:inline-flex;
      align-items:center;
      gap:8px;
    }
    .role strong:before{
      content:"✨ ";
    }


    .record-list{display:grid;gap:10px;margin-top:14px}
    .record-item{width:100%;text-align:left;border:1px solid var(--line);background:white;border-radius:18px;padding:14px;display:grid;gap:6px;cursor:pointer}
    .record-item:active{transform:scale(.99);background:var(--soft)}
    .record-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .record-name{font-weight:900;font-size:16px;color:var(--text)}
    .record-date{font-size:12px;color:var(--muted);white-space:nowrap}
    .record-summary{color:var(--muted);font-size:13px;line-height:1.55}
    .record-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
    .record-tag{background:var(--soft);color:var(--text);border-radius:999px;padding:5px 8px;font-size:11px;font-weight:800}
    .empty-record{background:var(--soft);border-radius:18px;padding:18px;text-align:center;color:var(--muted);line-height:1.65}


    .compare-panel{
      display:grid;
      gap:10px;
      margin-top:12px;
    }
    .compare-card{
      background:linear-gradient(180deg,#fff 0%,var(--soft) 100%);
      border:1px solid var(--line);
      border-radius:20px;
      padding:16px;
    }
    .compare-title{
      font-size:16px;
      font-weight:900;
      margin-bottom:6px;
      color:var(--text);
    }
    .compare-text{
      color:var(--muted);
      line-height:1.65;
      font-size:14px;
    }
    .compare-code{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:var(--accent);
      color:white;
      border-radius:999px;
      padding:7px 11px;
      font-size:12px;
      font-weight:900;
      margin-top:10px;
      word-break:break-all;
    }
    .poster-preview{
      background:#0f172a;
      color:white;
      border-radius:24px;
      padding:20px;
      margin-top:12px;
      overflow:hidden;
      position:relative;
    }
    .poster-preview:after{
      content:"";
      position:absolute;
      width:140px;
      height:140px;
      right:-48px;
      top:-48px;
      border-radius:999px;
      background:rgba(255,255,255,.12);
    }
    .poster-preview .poster-label{
      color:#cbd5e1;
      font-size:13px;
      font-weight:800;
      margin-bottom:10px;
      position:relative;
      z-index:1;
    }
    .poster-preview .poster-name{
      font-size:28px;
      line-height:1.08;
      font-weight:950;
      letter-spacing:-.04em;
      position:relative;
      z-index:1;
    }
    .poster-preview .poster-hook{
      margin-top:12px;
      color:#e5e7eb;
      font-weight:750;
      line-height:1.55;
      position:relative;
      z-index:1;
    }

    @media(max-width:380px){
      :root{--screen-pad:10px;--tap:56px}
      .card{padding:18px;border-radius:24px}
      .section{padding:16px;border-radius:20px}
      .option{font-size:15px;padding:15px}
      .btn{font-size:15.5px}
    }
    @media(min-width:560px){
      :root{--screen-pad:20px}
      .app{align-items:center}
      .card{padding:34px}
      .features{grid-template-columns:repeat(3,1fr)}
      .chips{grid-template-columns:1fr 1fr}
      .btns{grid-template-columns:1fr 1fr}
      .option:hover{
        background:var(--dark);
        color:white;
        border-color:var(--dark);
        transform:translateY(-1px);
      }
    }
    @media(prefers-reduced-motion:reduce){
      *{animation:none!important;transition:none!important;scroll-behavior:auto!important}
    }

  </style>
</head>
<body>
  <main class="app">
    <div class="wrap" id="app"></div>
  </main>
  <div class="toast" id="toast">已复制</div>

<script>
const GOOGLE_SCRIPT_WEBHOOK_URL = "";
const questions = [
  {text:"你准备学一个新东西时，通常会：",options:[["找讲解视频","visual"],["找人问清楚","audio"],["直接上手试","action"],["找系统文章看","text"]]},
  {text:"如果一个知识点只有抽象文字，没有图、没有例子，你会：",options:[["有点劝退，看不进去","visual"],["希望有人给我讲一遍","audio"],["先不管，试了再说","action"],["可以慢慢啃下来","text"]]},
  {text:"你更像哪种学习玩家：",options:[["视频流派：不看讲解不安心","visual"],["听讲流派：有人讲才有感觉","audio"],["操作流派：不动手就难受","action"],["阅读流派：文字才是王道","text"]]},
  {text:"遇到难点时，你最需要的是：",options:[["先给我一个整体框架","structure"],["一步一步讲清楚逻辑","logic"],["打个比方我就懂了","analogy"],["多看几个例子我就明白","induction"]]},
  {text:"如果别人讲得很乱，你通常会：",options:[["自己在脑子里整理结构","structure"],["自己重新推一遍逻辑","logic"],["换个角度理解","analogy"],["多找几个例子对比","induction"]]},
  {text:"当你说“我懂了”，更可能是因为：",options:[["我知道整体长什么样了","structure"],["每一步我都能解释清楚","logic"],["我能用别的东西类比出来","analogy"],["我见过很多类似情况","induction"]]},
  {text:"你更容易记住：",options:[["一张图或一个结构","visualMemory"],["别人讲过的一段话","languageMemory"],["自己做过的一次操作","actionMemory"],["真正理解过的原理","semanticMemory"]]},
  {text:"复习的时候，你更可能：",options:[["重新整理结构","visualMemory"],["讲一遍，哪怕是对空气","languageMemory"],["再做一遍","actionMemory"],["重新理解一遍","semanticMemory"]]},
  {text:"哪句话最真实：",options:[["这图我见过，我会","visualMemory"],["这话我听过，我会","languageMemory"],["这题我做过，我会","actionMemory"],["这原理我懂，我会","semanticMemory"]]},
  {text:"学完一节内容后，你更常见的是：",options:[["整理一下重点","summary"],["跟别人讲讲","explain"],["去做几道题或练习","practice"],["感觉差不多就过了","inputOnly"]]},
  {text:"你更接近哪种情况：",options:[["学一点就想试一下","practice"],["学完会整理","summary"],["学完会讲出来","explain"],["经常看懂了但不会做","inputOnly"]]},
  {text:"“我懂了！” 然后一做题：？？？ 这种情况你：",options:[["经常发生","inputOnly"],["偶尔发生","inputOnly"],["很少发生","practice"],["几乎没有","practice"]]},
  {text:"当你做错时，你通常会：",options:[["想结构是不是错了","feedback"],["找逻辑哪里出了问题","feedback"],["直接再做一遍","practice"],["看答案，然后进入下一题","lowFeedback"]]},
  {text:"你会不会认真复盘自己哪里错了：",options:[["经常会","feedback"],["偶尔会","feedback"],["很少会","lowFeedback"],["基本不会","lowFeedback"]]},
  {text:"你更接近哪种状态：",options:[["错题是宝藏","feedback"],["错题有点烦，但会看","feedback"],["看心情处理","lowFeedback"],["错了就错了，下一个","lowFeedback"]]},
  {text:"你更容易在哪种情况下学习：",options:[["有明确目标，比如考试或结果","goal"],["内容本身让我感兴趣","interest"],["有人一起学或监督","pressure"],["已经形成习惯，不用想","habit"]]},
  {text:"你最容易中断学习的原因是：",options:[["内容太乱，没有结构","needStructure"],["太无聊，提不起劲","needInterest"],["看不到效果","needFeedback"],["没有计划，容易散","needHabit"]]},
  {text:"你的学习状态更像：",options:[["一开始就很有规划","goal"],["喜欢就会爆发式投入","interest"],["临近 deadline 才猛学","pressure"],["稳定推进，不一定很猛","habit"]]}
];

const dimensionLabels = {
  input:{visual:"视频/图像输入",audio:"听讲/交流输入",text:"阅读/文本输入",action:"实操输入"},
  thinking:{structure:"结构型理解",logic:"逻辑型理解",analogy:"类比型理解",induction:"归纳型理解"},
  memory:{visualMemory:"图像记忆",languageMemory:"语言记忆",actionMemory:"动作记忆",semanticMemory:"语义记忆"},
  output:{practice:"练习型输出",explain:"讲解型输出",summary:"总结型输出",transfer:"迁移型输出",inputOnly:"输入依赖型"},
  feedback:{strong:"反馈强",weak:"反馈弱",lowReview:"复盘不足",highErrorUse:"错误利用率高"},
  motivation:{goal:"目标驱动",interest:"兴趣驱动",pressure:"压力驱动",habit:"习惯驱动"}

function scoreAnswers(answers){return answers.reduce((s,v)=>(s[v]=(s[v]||0)+1,s),{})}
function topOf(scores,keys){return keys.reduce((best,k)=>(scores[k]||0)>(scores[best]||0)?k:best,keys[0])}
function deriveDimensions(scores){
  const feedback=(scores.feedback||0)>=2?"strong":(scores.lowFeedback||0)>=2?"lowReview":"weak";
  return {
    input:topOf(scores,["visual","audio","text","action"]),
    thinking:topOf(scores,["structure","logic","analogy","induction"]),
    memory:topOf(scores,["visualMemory","languageMemory","actionMemory","semanticMemory"]),
    output:topOf(scores,["practice","explain","summary","transfer","inputOnly"]),
    feedback,
    motivation:topOf(scores,["goal","interest","pressure","habit"])
  }
}
function templateMatches(t,s,d){
  const m=t.match||{};
  if(m.input&&!m.input.includes(d.input))return false;
  if(m.thinking&&!m.thinking.includes(d.thinking))return false;
  if(m.memory&&!m.memory.includes(d.memory))return false;
  if(m.output&&!m.output.includes(d.output))return false;
  if(m.feedback&&!m.feedback.includes(d.feedback))return false;
  if(m.motivation&&!m.motivation.includes(d.motivation))return false;
  if(m.minScores)for(const [k,min] of Object.entries(m.minScores))if((s[k]||0)<min)return false;
  if(m.maxScores)for(const [k,max] of Object.entries(m.maxScores))if((s[k]||0)>max)return false;
  return true;
}
function buildReport(answers){
  const scores=Array.isArray(answers)?scoreAnswers(answers):answers;
  const dimensions=deriveDimensions(scores);
  const template=[...reportTemplates].filter(t=>templateMatches(t,scores,dimensions)).sort((a,b)=>b.priority-a.priority)[0]||reportTemplates[0];
  return {...template,dimensions,dimensionText:{
    input:dimensionLabels.input[dimensions.input],
    thinking:dimensionLabels.thinking[dimensions.thinking],
    memory:dimensionLabels.memory[dimensions.memory],
    output:dimensionLabels.output[dimensions.output],
    feedback:dimensionLabels.feedback[dimensions.feedback],
    motivation:dimensionLabels.motivation[dimensions.motivation]
  }};
}

function formatRecordDate(iso){
  const d=new Date(iso);
  if(Number.isNaN(d.getTime()))return "";
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,"0");
  const day=String(d.getDate()).padStart(2,"0");
  const hh=String(d.getHours()).padStart(2,"0");
  const mm=String(d.getMinutes()).padStart(2,"0");
  return `${y}-${m}-${day} ${hh}:${mm}`;
}

function deepAnalysis(r){
  const inputText=r.dimensionText.input;
  const thinkingText=r.dimensionText.thinking;
  const memoryText=r.dimensionText.memory;
  const outputText=r.dimensionText.output;
  const feedbackText=r.dimensionText.feedback;
  const motivationText=r.dimensionText.motivation;
  return `从你的答题模式来看，${r.name}并不是一个简单标签，而是你当前学习系统的综合倾向。你更习惯通过「${inputText}」进入知识，再用「${thinkingText}」处理信息，并依靠「${memoryText}」形成记忆痕迹。这个组合会让你在某些学习场景里很顺，比如遇到符合你习惯的材料、讲解或任务时，你会比较快地进入状态；但一旦学习任务要求你换一种方式输出、独立调用知识，或者在错误中持续修正，效率就可能出现明显波动。

更具体地说，你现在的优势不是单点能力，而是一条已经形成惯性的学习路径。它能给你熟悉感和稳定感，也能帮你快速启动学习。但真正决定学习效果的，不只是你能不能看懂、听懂或想明白，而是知识有没有经过输出和反馈。你的当前输出倾向是「${outputText}」，反馈模式是「${feedbackText}」，这两个维度会直接影响你能不能把理解转化为成绩、技能或作品。如果输出不足，你会容易出现“学的时候很顺，用的时候卡住”；如果反馈不足，你会重复消耗时间，却很难知道自己到底卡在哪一步。

你的动力来源偏向「${motivationText}」，这说明你并不是没有动力，而是需要用更匹配的方式启动自己。比如目标驱动的人需要清晰任务，兴趣驱动的人需要把基础内容连接到真实兴趣，压力驱动的人需要可控的截止时间，习惯驱动的人则需要稳定流程和周期复盘。接下来最重要的，不是推翻你原来的学习方式，而是在原有优势上补齐短板：让输入更快进入输出，让错误更快变成反馈，让理解能够被验证、复述、练习和迁移。这样你的学习效率才会从“感觉学了很多”，变成“真正能用出来”。`;
}

        </div>
      </div>
      <button class="btn" style="margin-top:12px" onclick="shareCompareInvite()">发给朋友对比</button>
    </section>`;
  }
  const result=compareWithFriend(friend);
  return `<section class="section soft">
    <h3>朋友对比结果</h3>
    <div class="compare-panel">
      <div class="compare-card">
        <div class="compare-title">你：${r.name}</div>
        <div class="compare-text">朋友：${result.friendName}</div>
        <div class="compare-code">${result.same.length?`相似：${result.same.join(" / ")}`:"相似项较少"}</div>
      </div>
      <div class="compare-card">
        <div class="compare-title">${result.same.length>=3?"同频学习搭子":"互补型学习队友"}</div>
        <div class="compare-text">${result.text}</div>
      </div>
    </div>
    <button class="btn" style="margin-top:12px" onclick="shareCompareInvite()">继续邀请朋友</button>
  </section>`;
}

function saveShareCard(){
  const r=lastReport||buildReport(answers);
  const meta=typeof getFunMeta==="function"?getFunMeta(r):{emoji:"🧠",hook:r.summary,tags:[r.name],accent:"#111827",soft:"#f8fafc"};
  const canvas=document.createElement("canvas");
  const scale=2;
  canvas.width=900*scale;
  canvas.height=1500*scale;
  const ctx=canvas.getContext("2d");
  ctx.scale(scale,scale);

  const accent=meta.accent||"#111827";
  const soft=meta.soft||"#f8fafc";

  ctx.fillStyle=soft;
  ctx.fillRect(0,0,900,1500);

  roundRect(ctx,54,54,792,1392,48,"#ffffff");
  ctx.fillStyle=accent;
  ctx.beginPath();
  ctx.arc(740,150,170,0,Math.PI*2);
  ctx.fill();
  ctx.globalAlpha=.09;
  ctx.beginPath();
  ctx.arc(160,1260,220,0,Math.PI*2);
  ctx.fill();
  ctx.globalAlpha=1;

  ctx.fillStyle="#6b7280";
  ctx.font="700 30px sans-serif";
  ctx.fillText("你的学习类型是",100,140);

  ctx.fillStyle="#111827";
  ctx.font="900 76px sans-serif";
  wrapText(ctx,`${meta.emoji||""} ${r.name}`,100,245,650,86);

  ctx.fillStyle="#111827";
  ctx.font="800 38px sans-serif";
  wrapText(ctx,meta.hook||r.summary,100,420,680,52);

  ctx.fillStyle="#6b7280";
  ctx.font="500 30px sans-serif";
  wrapText(ctx,r.summary,100,560,680,44);

  let tagX=100, tagY=720;
  (meta.tags||r.shareKeywords||[]).slice(0,3).forEach(tag=>{
    const w=ctx.measureText(tag).width+44;
    roundRect(ctx,tagX,tagY,w,48,24,accent);
    ctx.fillStyle="#ffffff";
    ctx.font="800 24px sans-serif";
    ctx.fillText(tag,tagX+22,tagY+32);
    tagX+=w+16;
  });

  ctx.fillStyle="#111827";
  ctx.font="900 36px sans-serif";
  ctx.fillText("核心诊断",100,840);

  ctx.fillStyle="#6b7280";
  ctx.font="500 28px sans-serif";
  wrapText(ctx,`优势：${r.strengths[0]}`,100,900,680,42);
  wrapText(ctx,`瓶颈：${r.bottlenecks[0]}`,100,1010,680,42);

  ctx.fillStyle="#111827";
  ctx.font="900 36px sans-serif";
  ctx.fillText("现在就这样学",100,1140);

  ctx.fillStyle="#6b7280";
  ctx.font="500 28px sans-serif";
  const actions=(r.quickActions||[]).slice(0,2);
  let y=1200;
  actions.forEach((item,index)=>{
    wrapText(ctx,`${index+1}. ${item}`,100,y,680,42);
    y+=105;
  });

  ctx.fillStyle="#111827";
  ctx.font="800 30px sans-serif";
  ctx.fillText("测测你的学习方式",100,1400);
  ctx.fillStyle="#6b7280";
  ctx.font="500 24px sans-serif";
  ctx.fillText("保存图片，分享给朋友一起测",100,1440);

  const a=document.createElement("a");
  a.href=canvas.toDataURL("image/png");
  a.download=`学习方式测试长图-${r.name}.png`;
  a.click();
  showToast("长图已生成");
}
function roundRect(ctx,x,y,w,h,r,color){ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();ctx.fill()}
function wrapText(ctx,text,x,y,maxWidth,lineHeight){let line="";for(const ch of String(text).split("")){const test=line+ch;if(ctx.measureText(test).width>maxWidth&&line){ctx.fillText(line,x,y);line=ch;y+=lineHeight}else line=test}if(line)ctx.fillText(line,x,y)}
loadState();
render();
</script>
